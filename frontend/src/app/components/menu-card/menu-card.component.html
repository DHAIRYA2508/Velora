<div class="bg-white rounded-2xl overflow-hidden shadow-sm border border-gray-100 hover:shadow-card-hover hover:-translate-y-1 transition-all duration-300 flex flex-col group">

  <!-- Image Container -->
  <div class="relative overflow-hidden h-52">
    <img [src]="item.imageUrl" [alt]="item.name"
      class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 ease-out"
      loading="lazy"
      (error)="$any($event.target).src='https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&h=400&fit=crop&auto=format'">

    <!-- Category tag -->
    <div class="absolute top-3 left-3">
      <span class="bg-white/90 backdrop-blur-sm text-gray-700 text-xs font-semibold px-3 py-1 rounded-full shadow-sm border border-white/50">
        {{ item.category }}
      </span>
    </div>

    <!-- Price overlay -->
    <div class="absolute top-3 right-3">
      <span class="bg-amber-500 text-white text-sm font-bold px-3 py-1 rounded-full shadow-sm">
        ${{ item.price.toFixed(2) }}
      </span>
    </div>
  </div>

  <!-- Content -->
  <div class="p-5 flex flex-col flex-1">
    <h3 class="text-base font-bold text-gray-900 mb-1.5 leading-snug">{{ item.name }}</h3>
    <p class="text-gray-500 text-sm leading-relaxed flex-1 line-clamp-2">{{ item.description }}</p>

    <button (click)="onAddToCart()"
      class="mt-4 w-full bg-gray-900 hover:bg-amber-500 text-white font-semibold py-2.5 px-4 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 text-sm group/btn">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
      </svg>
      Add to Cart
    </button>
  </div>
</div>
