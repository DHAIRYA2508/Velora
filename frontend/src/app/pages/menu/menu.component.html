<!-- Hero banner -->
<div class="relative h-64 md:h-80 flex items-center justify-center overflow-hidden">
  <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=1600&h=600&fit=crop&auto=format&q=90"
    class="absolute inset-0 w-full h-full object-cover" alt="Menu">
  <div class="absolute inset-0 bg-black/60"></div>
  <div class="relative text-center">
    <p class="section-label text-gold-400 mb-3">Velora Restaurant</p>
    <h1 class="font-display text-5xl md:text-6xl font-bold text-white">Our Menu</h1>
    <div class="flex items-center justify-center gap-4 mt-4">
      <div class="h-px w-8 bg-gold-500"></div>
      <p class="text-white/50 font-body text-xs uppercase tracking-widest">Seasonal · Artisanal · Exceptional</p>
      <div class="h-px w-8 bg-gold-500"></div>
    </div>
  </div>
</div>

<!-- Category tabs -->
<div class="bg-white border-b border-gray-100 sticky top-20 z-40">
  <div class="max-w-7xl mx-auto px-6 flex gap-0 overflow-x-auto">
    <button *ngFor="let cat of categories"
      (click)="filter(cat)"
      [class]="active === cat
        ? 'px-6 py-4 font-body text-xs uppercase tracking-widest font-semibold border-b-2 border-gold-500 text-gold-600 whitespace-nowrap'
        : 'px-6 py-4 font-body text-xs uppercase tracking-widest font-semibold border-b-2 border-transparent text-gray-400 hover:text-gray-700 transition-colors whitespace-nowrap'">
      {{ cat }}
    </button>
  </div>
</div>

<!-- Loading skeleton -->
<div *ngIf="loading" class="max-w-7xl mx-auto px-6 py-16 grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
  <div *ngFor="let s of [1,2,3,4,5,6,7,8]" class="animate-pulse">
    <div class="bg-gray-200 aspect-[4/3] mb-4"></div>
    <div class="h-3 bg-gray-200 rounded w-1/3 mb-3"></div>
    <div class="h-5 bg-gray-200 rounded w-3/4 mb-2"></div>
    <div class="h-3 bg-gray-200 rounded w-full mb-4"></div>
    <div class="h-10 bg-gray-100 rounded"></div>
  </div>
</div>

<!-- Menu grid -->
<div *ngIf="!loading" class="max-w-7xl mx-auto px-6 py-16">
  <div class="grid sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-8 gap-y-14">
    <div *ngFor="let item of filtered" class="group">

      <!-- Image -->
      <div class="relative overflow-hidden aspect-[4/3] mb-5">
        <img [src]="item.imageUrl || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=400&h=300&fit=crop'"
          [alt]="item.name"
          class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700">
        <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
        <span class="absolute top-3 left-3 bg-velora-dark/80 text-gold-400 text-xs uppercase tracking-widest px-3 py-1 font-body font-semibold backdrop-blur-sm">
          {{ item.category }}
        </span>
      </div>

      <!-- Info -->
      <div class="px-1">
        <h3 class="font-display text-lg font-bold text-velora-dark mb-2 group-hover:text-gold-600 transition-colors duration-300">{{ item.name }}</h3>
        <p class="font-body text-gray-400 text-xs leading-relaxed mb-4 line-clamp-2">{{ item.description }}</p>

        <div class="flex items-center justify-between">
          <span class="font-display text-xl font-bold text-velora-dark">₹{{ item.price | number:'1.0-0' }}</span>

          <!-- Add to cart (customers only) -->
          <button *ngIf="auth.isCustomer" (click)="addToCart(item)"
            [class]="added[item.id]
              ? 'bg-green-600 text-white text-xs uppercase tracking-widest px-4 py-2.5 font-body font-semibold transition-all duration-300'
              : 'bg-velora-dark hover:bg-gold-500 text-white text-xs uppercase tracking-widest px-4 py-2.5 font-body font-semibold transition-all duration-300'">
            {{ added[item.id] ? '✓ Added' : 'Add to Order' }}
          </button>

          <!-- Login prompt -->
          <a *ngIf="!auth.isLoggedIn" routerLink="/login"
            class="text-gold-600 text-xs uppercase tracking-widest font-body font-semibold hover:text-gold-700 transition-colors">
            Sign In →
          </a>
        </div>
      </div>

    </div>
  </div>

  <!-- Empty state -->
  <div *ngIf="filtered.length === 0" class="text-center py-24">
    <p class="font-display text-2xl text-gray-300 italic mb-2">Nothing here yet</p>
    <p class="font-body text-gray-400 text-sm">Check back soon for new additions to our menu.</p>
  </div>
</div>
